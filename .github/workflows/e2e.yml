name: E2E Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loyalty
          POSTGRES_PASSWORD: loyalty
          POSTGRES_DB: loyalty
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty
      NEXT_PUBLIC_API_URL: http://localhost:3001
      STAGING_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright deps
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Apply DB schema
        run: psql $DATABASE_URL -f database/schema.sql

      - name: Start backend
        run: npm run dev &
        working-directory: backend
        env:
          PORT: 3001
          ENABLE_INDEXER: "false"

      - name: Build & start frontend
        run: |
          npm run build
          npm run start &
        working-directory: frontend

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npx playwright test --workers=3
        working-directory: e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7
