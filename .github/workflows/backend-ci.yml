name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loyalty
          POSTGRES_PASSWORD: loyalty
          POSTGRES_DB: loyalty
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty
      TEST_DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate:up

      - name: Create dedicated integration test database
        run: psql $DATABASE_URL -c "CREATE DATABASE loyalty_test;"

      - name: Apply test DB schema
        run: psql $TEST_DATABASE_URL -f ../database/schema.sql

      - name: Run unit tests
        run: npm test -- --ci --coverage

      - name: Run integration tests
        run: npm run test:integration -- --ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-coverage
          path: backend/coverage/
          retention-days: 7

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -t soroban-loyalty-backend:${{ github.sha }} ./backend

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: soroban-loyalty-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  audit-backend:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        # --audit-level=critical blocks on critical; we capture output for the comment
        run: npm audit --audit-level=critical 2>&1 | tee audit-results.txt
        continue-on-error: true

      - name: Post audit results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('backend/audit-results.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔒 Backend npm Audit Results\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Open issue for high vulnerabilities
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('backend/audit-results.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ High/Critical npm vulnerability detected (backend)',
              labels: ['security', 'dependencies'],
              body: `npm audit found vulnerabilities in the backend.\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Fail on critical vulnerabilities
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1

  audit-frontend:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: npm audit --audit-level=critical 2>&1 | tee audit-results.txt
        continue-on-error: true

      - name: Post audit results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('frontend/audit-results.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔒 Frontend npm Audit Results\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Open issue for high vulnerabilities
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('frontend/audit-results.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ High/Critical npm vulnerability detected (frontend)',
              labels: ['security', 'dependencies'],
              body: `npm audit found vulnerabilities in the frontend.\n\n\`\`\`\n${body}\n\`\`\``,
            });

      - name: Fail on critical vulnerabilities
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1
