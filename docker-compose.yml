version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty_secret
      POSTGRES_DB: soroban_loyalty
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d soroban_loyalty"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Resource limits: postgres is the most resource-intensive service
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  soroban-local:
    image: stellar/quickstart:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NETWORK: local
      ENABLE_SOROBAN_RPC: "true"
    command: --local --enable-soroban-rpc
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/soroban/rpc || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    # Resource limits: local Stellar node — moderate usage
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soroban-local:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://loyalty:loyalty_secret@postgres:5432/soroban_loyalty
      REDIS_URL: redis://redis:6379
      SOROBAN_RPC_URL: http://soroban-local:8000/soroban/rpc
      NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      REWARDS_CONTRACT_ID: ${REWARDS_CONTRACT_ID:-}
      CAMPAIGN_CONTRACT_ID: ${CAMPAIGN_CONTRACT_ID:-}
      PORT: 3001
      ENABLE_INDEXER: "true"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits: backend + indexer — 512MB cap prevents indexer memory leaks
    # from consuming host resources. OOM kills will appear in `docker inspect` State.OOMKilled.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOROBAN_RPC_URL: http://localhost:8000/soroban/rpc
      NEXT_PUBLIC_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      NEXT_PUBLIC_REWARDS_CONTRACT_ID: ${REWARDS_CONTRACT_ID:-}
      NEXT_PUBLIC_CAMPAIGN_CONTRACT_ID: ${CAMPAIGN_CONTRACT_ID:-}
    ports:
      - "3000:3000"
    # Resource limits: Next.js SSR — 256MB is sufficient for static/SSR pages
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000"

  # ── ELK Stack ──────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTICSEARCH_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: elasticsearch:9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./monitoring/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    restart: unless-stopped
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOST: elasticsearch:9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
    volumes:
      - ./monitoring/elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  elasticsearch_data:
