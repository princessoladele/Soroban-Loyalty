input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs from the backend (structured logging)
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log"
    }
  }

  # Redact sensitive fields from log data
  mutate {
    remove_field => ["[log][token]", "[log][jwt]", "[log][secret]", "[log][password]",
                     "[log][authorization]", "[log][private_key]"]
  }

  # Mask any remaining token-like strings (hex 32+ chars or base64 JWT pattern)
  gsub {
    field => "message"
    pattern => '\b[A-Za-z0-9+/]{40,}={0,2}\b'
    replacement => "[REDACTED]"
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:production}" }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "soroban-loyalty-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
  }
}
